name = "documint"
main = "src/worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Routes
routes = [
  { pattern = "documint.chitty.cc/*", zone_name = "chitty.cc" },
  { pattern = "api.chitty.cc/documint/*", zone_name = "chitty.cc" }
]

# KV Namespaces
kv_namespaces = [
  { binding = "DOCUMINT_CACHE", id = "documint-cache" },
  { binding = "PROOFS", id = "documint-proofs" }
]

# Durable Objects
[durable_objects]
bindings = [
  { name = "PROOF_STATE", class_name = "ProofStateDO" }
]

[[migrations]]
tag = "v1"
new_classes = ["ProofStateDO"]

# Environment Variables
[vars]
ENVIRONMENT = "production"
VERSION = "1.0.0"

# Staging
[env.staging]
name = "documint-staging"
routes = [
  { pattern = "documint-staging.chitty.cc/*", zone_name = "chitty.cc" }
]
[env.staging.vars]
ENVIRONMENT = "staging"

# Development
[env.dev]
name = "documint-dev"
[env.dev.vars]
ENVIRONMENT = "development"
